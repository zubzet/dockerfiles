name: Build & publish

on:
  push:
    branches: [main]
    paths:
      - 'php/**'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:
  schedule:
    # Weekly Sunday 03:00 UTC — pick up upstream php:X.Y point releases
    - cron: '0 3 * * 0'

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  base:
    name: ${{ matrix.php }}-${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        variant: [php, apache]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tag suffix
        id: tag
        run: |
          if [[ "${{ matrix.variant }}" == "apache" ]]; then
            echo "suffix=-apache" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ./php
          file: ./php/v${{ matrix.php }}/${{ matrix.variant }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/zubzet/php:${{ matrix.php }}${{ steps.tag.outputs.suffix }}
            docker.io/zubzet/php:${{ matrix.php }}${{ steps.tag.outputs.suffix }}
          cache-from: type=gha,scope=php-${{ matrix.php }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=php-${{ matrix.php }}-${{ matrix.variant }}

  xdebug:
    name: ${{ matrix.php }}-xdebug
    runs-on: ubuntu-latest
    needs: base
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./php
          file: ./php/v${{ matrix.php }}/xdebug/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/zubzet/php:${{ matrix.php }}-xdebug
            docker.io/zubzet/php:${{ matrix.php }}-xdebug
          cache-from: type=gha,scope=php-${{ matrix.php }}-xdebug
          cache-to: type=gha,mode=max,scope=php-${{ matrix.php }}-xdebug
