name: Build & publish

on:
  push:
    branches: [main]
    paths:
      - 'php/**'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:
  schedule:
    # Monthly 1st 03:00 UTC — pick up upstream php:X.Y point releases.
    - cron: '0 3 1 * *'

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_GHCR: ghcr.io/zubzet/php
  IMAGE_DOCKERHUB: docker.io/zubzet/php

jobs:
  # ── Base images (php / apache) ─────────────────────────────────────────────
  # Each arch builds natively on its own runner (amd64 → ubuntu-latest,
  # arm64 → ubuntu-24.04-arm — free for public repos, no QEMU emulation) and
  # pushes its single-arch image by digest. The merge job then assembles the
  # multi-arch manifest under the real tags.
  base-build:
    name: build ${{ matrix.php }}-${{ matrix.variant }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        variant: [php, apache]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./php
          file: ./php/v${{ matrix.php }}/${{ matrix.variant }}/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE_GHCR }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=base-${{ matrix.php }}-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.php }}-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-base-${{ matrix.php }}-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  base-merge:
    name: merge ${{ matrix.php }}-${{ matrix.variant }}
    needs: base-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        variant: [php, apache]
        include:
          - variant: php
            suffix: ''
          - variant: apache
            suffix: '-apache'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-base-${{ matrix.php }}-${{ matrix.variant }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: zubzet
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          tag="${{ matrix.php }}${{ matrix.suffix }}"
          docker buildx imagetools create \
            -t "${IMAGE_GHCR}:${tag}" \
            -t "${IMAGE_DOCKERHUB}:${tag}" \
            $(printf "${IMAGE_GHCR}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE_GHCR}:${{ matrix.php }}${{ matrix.suffix }}"

  # ── xdebug images ──────────────────────────────────────────────────────────
  # These FROM the freshly-published apache base manifest, so they must wait for
  # base-merge before building (each arch pulls its matching base layer).
  xdebug-build:
    name: build ${{ matrix.php }}-xdebug (${{ matrix.platform }})
    needs: base-merge
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./php
          file: ./php/v${{ matrix.php }}/xdebug/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE_GHCR }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=xdebug-${{ matrix.php }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=xdebug-${{ matrix.php }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-xdebug-${{ matrix.php }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  xdebug-merge:
    name: merge ${{ matrix.php }}-xdebug
    needs: xdebug-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-xdebug-${{ matrix.php }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: zubzet
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          tag="${{ matrix.php }}-xdebug"
          docker buildx imagetools create \
            -t "${IMAGE_GHCR}:${tag}" \
            -t "${IMAGE_DOCKERHUB}:${tag}" \
            $(printf "${IMAGE_GHCR}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE_GHCR}:${{ matrix.php }}-xdebug"
